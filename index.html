<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>متجر العطور | لوحة التحكم</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --black: #000; --gold: #c5a059; --gray: #f4f4f4; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: #fff; color: var(--black); }
        
        /* Layout */
        header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 100; }
        .hero { height: 40vh; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; text-align: center; background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=1200&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { border: 1px solid #eee; border-radius: 8px; overflow: hidden; transition: 0.3s; position: relative; }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .price { color: var(--gold); font-weight: bold; display: block; margin: 5px 0; }
        
        /* Admin Panel Styles */
        .admin-section { background: var(--gray); padding: 40px 20px; margin-top: 50px; border-top: 2px solid #000; }
        .admin-form { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        input, button { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Tajawal'; }
        .btn-add { background: var(--black); color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; margin-top: 10px; }
        
        /* Status message */
        #status { text-align: center; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.5rem; font-weight: 700;">عطور دبل دبليو</div>
</header>

<section class="hero">
    <h1>مجموعة العطور الحصرية</h1>
</section>

<div class="container">
    <div class="grid" id="product-container">
        <p style="text-align: center; grid-column: 1/-1;">جاري التحميل...</p>
    </div>
</div>

<div class="admin-section">
    <div class="container">
        <h2 style="text-align: center;">لوحة التحكم (إضافة منتج جديد)</h2>
        <div class="admin-form">
            <input type="text" id="prod-name" placeholder="اسم العطر" required>
            <input type="number" id="prod-price" placeholder="السعر (JOD)" required>
            <p style="font-size: 0.8rem; margin: 0;">اختر صورة العطر:</p>
            <input type="file" id="prod-img" accept="image/*" required>
            <button class="btn-add" onclick="handleUpload()">إضافة المنتج للمتجر</button>
            <div id="status"></div>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyCoy1g_vb32AjBZQNBooSV6thU07Lwbbhk",
      authDomain: "perfumes-6207f.firebaseapp.com",
      projectId: "perfumes-6207f",
      storageBucket: "perfumes-6207f.firebasestorage.app",
      messagingSenderId: "276789183181",
      appId: "1:276789183181:web:cf7b7d3b4b30c9f3c09f84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. IMGBB CONFIG
    const IMGBB_API_KEY = "2f414f808b93f92c4306a53541beb469";

    // 3. FETCH & DISPLAY PRODUCTS (Live)
    const container = document.getElementById('product-container');
    
    db.collection("products").onSnapshot((querySnapshot) => {
        container.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            container.innerHTML += `
                <div class="card">
                    <img src="${data.image}" alt="${data.name}">
                    <div class="card-info">
                        <h3>${data.name}</h3>
                        <span class="price">${data.price} JOD</span>
                        <button class="btn-delete" onclick="deleteProduct('${doc.id}')">حذف المنتج</button>
                    </div>
                </div>
            `;
        });
    });

    // 4. ADD PRODUCT LOGIC
    async function handleUpload() {
        const name = document.getElementById('prod-name').value;
        const price = document.getElementById('prod-price').value;
        const fileInput = document.getElementById('prod-img');
        const status = document.getElementById('status');

        if (!name || !price || !fileInput.files[0]) {
            alert("يرجى ملء جميع الحقول واختيار صورة");
            return;
        }

        status.innerText = "جاري رفع الصورة...";

        // Step A: Upload to ImgBB
        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();
            const imageUrl = result.data.url;

            // Step B: Save to Firebase
            status.innerText = "جاري حفظ المنتج...";
            await db.collection("products").add({
                name: name,
                price: price,
                image: imageUrl,
                createdAt: new Date()
            });

            status.innerText = "تمت الإضافة بنجاح!";
            document.getElementById('prod-name').value = "";
            document.getElementById('prod-price').value = "";
            fileInput.value = "";
        } catch (error) {
            console.error(error);
            status.innerText = "حدث خطأ في الرفع.";
        }
    }

    // 5. DELETE PRODUCT LOGIC
    function deleteProduct(id) {
        if(confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
            db.collection("products").doc(id).delete();
        }
    }
</script>

</body>
</html>
