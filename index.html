<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>عطور أبو جاد | Abu Jad Perfumes</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --black: #080808; 
            --gold: #c5a059; 
            --white: #ffffff; 
            --gray: #f9f9f9;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: var(--white); color: var(--black); overflow-x: hidden; scroll-behavior: smooth; }

        /* Top Announcement Bar */
        #top-announcement { background: var(--black); color: var(--white); text-align: center; padding: 12px; font-size: 0.8rem; letter-spacing: 1px; z-index: 1100; }

        /* Glassmorphism Header */
        header { 
            padding: 15px 5%; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            position: sticky; top: 0; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; color: var(--black); text-decoration: none; }

        /* Parallax Video Hero */
        .hero {
            position: relative; height: 85vh; width: 100%; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .hero video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; filter: brightness(0.55);
        }
        .hero-content { text-align: center; color: white; z-index: 10; }
        .hero-content h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; font-weight: 500; text-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .hero-content p { font-size: 1.2rem; opacity: 0.9; margin-top: 15px; letter-spacing: 2px; }

        /* Category Filter Bar */
        .filter-bar { 
            display: flex; justify-content: center; gap: 15px; padding: 40px 10px; 
            overflow-x: auto; background: var(--white);
        }
        .filter-btn { 
            padding: 8px 25px; border: 1px solid #eee; background: none; 
            cursor: pointer; font-family: 'Tajawal'; font-size: 0.9rem; border-radius: 30px;
        }
        .filter-btn.active { background: var(--black); color: white; border-color: var(--black); }

        /* Product Grid (Cubes) */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .card { 
            background: white; border: 1px solid #f0f0f0; position: relative; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 170px; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; flex-grow: 1; }
        .card-info h3 { font-size: 0.9rem; margin: 5px 0; font-weight: 500; }
        .price { color: var(--gold); font-weight: 700; margin-bottom: 10px; display: block; }
        
        /* Quantity & Cart Actions */
        .qty-box { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; gap: 10px; }
        .qty-btn { background: #f4f4f4; border: none; width: 25px; height: 25px; cursor: pointer; border-radius: 4px; }
        .btn-cart { background: var(--black); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        /* Floating Social & Cart */
        .float-wrap { position: fixed; bottom: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .right-float { right: 30px; }
        .left-float { left: 30px; }
        .icon-circle { width: 60px; height: 60px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); color: white; font-size: 1.5rem; position: relative; }
        .badge { position: absolute; top: 0; right: 0; background: var(--black); font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; }
        .social-img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        /* Footer */
        footer { background: var(--black); color: #fff; padding: 80px 20px 20px; text-align: center; }
        .footer-msg { font-size: 1.5rem; color: var(--gold); margin-bottom: 30px; display: block; font-weight: 600; }
        .rights-box { background: #000; padding: 20px; color: #555; font-size: 0.75rem; border-top: 1px solid #1a1a1a; margin-top: 40px; }

        /* ADMIN PANEL OVERLAY */
        #admin-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 5000; padding: 40px 20px; overflow-y: auto; 
        }
        .admin-box { max-width: 600px; margin: 0 auto; background: #fafafa; padding: 25px; border-radius: 12px; border: 1px solid #eee; }
        .admin-box input, .admin-box select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Tajawal'; }
        
        /* Admin Inventory (Delete List) */
        .inventory-list { margin-top: 30px; border-top: 2px solid #ddd; padding-top: 20px; }
        .inventory-item { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        .inventory-item img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-announcement">...</div>

<header>
    <a href="#" class="logo">ABU JAD PERFUMES</a>
    <div style="font-size: 0.85rem; font-weight: 700; cursor: pointer;" onclick="document.getElementById('shop').scrollIntoView()">المتجر</div>
</header>

<section class="hero">
    <video autoplay loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="hero-content">
        <h1 class="animate__animated animate__fadeInDown">عطور أبو جاد</h1>
        <p class="animate__animated animate__fadeInUp">فخامة تستحقها</p>
    </div>
</section>

<div class="filter-bar" id="category-filters">
    <button class="filter-btn active" onclick="filterCat('الكل')">الكل</button>
    <button class="filter-btn" onclick="filterCat('شرقي')">شرقي</button>
    <button class="filter-btn" onclick="filterCat('فرنسي')">فرنسي</button>
</div>

<div class="container" id="shop">
    <div class="grid" id="product-grid"></div>
</div>

<div class="float-wrap right-float">
    <div class="icon-circle" onclick="checkoutWhatsApp()">🛒 <span class="badge" id="cart-count">0</span></div>
</div>

<div class="float-wrap left-float">
    <a href="#"><img src="Instagram.png" class="social-img"></a>
    <a href="#"><img src="Facebook.png" class="social-img"></a>
    <a href="#"><img src="maps.png" class="social-img"></a>
</div>

<footer>
    <span class="footer-msg" id="footer-msg">عطور أبو جاد | الفخامة المطلقة</span>
    <div class="rights-box">
        جميع الحقوق محفوظة. © 2026 Abu Jad Perfumes | All Rights Reserved
    </div>
</footer>

<div id="admin-overlay">
    <div class="admin-box">
        <button onclick="closeAdmin()" style="background:#000; color:#fff; border:none; padding:12px 25px; cursor:pointer; border-radius:8px; margin-bottom:25px; font-weight:bold;">× إغلاق لوحة التحكم</button>
        
        <h3>إعدادات الرسائل</h3>
        <input type="text" id="set-top-msg" placeholder="نص الشريط العلوي">
        <input type="text" id="set-footer-msg" placeholder="نص التذييل">
        <button onclick="saveSettings()" style="width:100%; padding:12px; background:#3498db; color:white; border:none; border-radius:8px; margin-bottom:25px; cursor:pointer;">حفظ النصوص</button>
        
        <hr>
        <h3>إضافة منتج جديد</h3>
        <input type="text" id="p-name" placeholder="اسم العطر">
        <input type="number" id="p-price" placeholder="السعر (JOD)">
        <select id="p-cat">
            <option value="الكل">بدون تصنيف</option>
            <option value="شرقي">شرقي</option>
            <option value="فرنسي">فرنسي</option>
        </select>
        <input type="file" id="p-img">
        <button onclick="addProduct()" style="width:100%; padding:15px; background:#2ecc71; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">نشر المنتج</button>
        <p id="status" style="text-align:center; font-size:0.8rem;"></p>

        <div class="inventory-list">
            <h3>قائمة الجرد (الحذف)</h3>
            <div id="admin-inventory"></div>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyCoy1g_vb32AjBZQNBooSV6thU07Lwbbhk",
        authDomain: "perfumes-6207f.firebaseapp.com",
        projectId: "perfumes-6207f",
        storageBucket: "perfumes-6207f.firebasestorage.app",
        messagingSenderId: "276789183181",
        appId: "1:276789183181:web:cf7b7d3b4b30c9f3c09f84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_KEY = "2f414f808b93f92c4306a53541beb469";

    let cart = [];

    // 2. ADMIN AUTH LOGIC
    const checkAdmin = () => {
        if(window.location.hash === "#admin55") {
            if(prompt("كلمة مرور الإدارة") === "123456") {
                document.getElementById('admin-overlay').style.display = 'block';
            } else { window.location.hash = ""; }
        } else { document.getElementById('admin-overlay').style.display = 'none'; }
    };
    window.addEventListener("hashchange", checkAdmin);
    checkAdmin();
    function closeAdmin() { window.location.hash = ""; }

    // 3. LIVE SETTINGS
    db.collection("settings").doc("main").onSnapshot(doc => {
        if(doc.exists) {
            document.getElementById('top-announcement').innerText = doc.data().topMsg || "أهلاً بك";
            document.getElementById('footer-msg').innerText = doc.data().footerMsg || "Abu Jad Perfumes";
        }
    });

    // 4. LOAD PRODUCTS (Store & Admin Inventory)
    const loadProducts = (cat) => {
        let query = db.collection("products").orderBy("createdAt", "desc");
        if(cat !== "الكل") query = query.where("category", "==", cat);

        query.onSnapshot(snap => {
            const grid = document.getElementById('product-grid');
            const adminInv = document.getElementById('admin-inventory');
            grid.innerHTML = "";
            adminInv.innerHTML = "";

            snap.forEach(doc => {
                const p = doc.data();
                // To Shop
                grid.innerHTML += `
                    <div class="card animate__animated animate__fadeIn">
                        <img src="${p.image}">
                        <div class="card-info">
                            <h3>${p.name}</h3>
                            <span class="price">${p.price} JOD</span>
                            <div class="qty-box">
                                <button class="qty-btn" onclick="changeQty('${doc.id}', -1)">-</button>
                                <span id="qty-${doc.id}">1</span>
                                <button class="qty-btn" onclick="changeQty('${doc.id}', 1)">+</button>
                            </div>
                            <button class="btn-cart" onclick="addToCart('${p.name}', ${p.price}, '${doc.id}')">إضافة للسلة</button>
                        </div>
                    </div>
                `;
                // To Admin List
                adminInv.innerHTML += `
                    <div class="inventory-item">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <img src="${p.image}">
                            <div>
                                <div style="font-weight:bold; font-size:0.9rem;">${p.name}</div>
                                <div style="font-size:0.8rem; color:var(--gold);">${p.price} JOD</div>
                            </div>
                        </div>
                        <button class="btn-del" onclick="deleteP('${doc.id}')">حذف</button>
                    </div>
                `;
            });
        });
    };
    loadProducts("الكل");

    // 5. SHOPPING LOGIC
    function changeQty(id, val) {
        const span = document.getElementById('qty-'+id);
        let cur = parseInt(span.innerText);
        if(cur + val > 0) span.innerText = cur + val;
    }

    function addToCart(name, price, id) {
        const qty = parseInt(document.getElementById('qty-'+id).innerText);
        cart.push({ name, price, qty });
        document.getElementById('cart-count').innerText = cart.length;
        alert("تمت الإضافة للسلة بنجاح");
    }

    function checkoutWhatsApp() {
        if(cart.length === 0) return alert("السلة فارغة!");
        let msg = "مرحباً أبو جاد، أود طلب الآتي من الموقع:%0a";
        let total = 0;
        cart.forEach(item => {
            msg += `- ${item.name} (عدد: ${item.qty}) السعر: ${item.price * item.qty} JOD%0a`;
            total += item.price * item.qty;
        });
        msg += `%0aالمجموع النهائي: ${total} JOD`;
        window.open(`https://wa.me/962782647590?text=${msg}`, '_blank');
    }

    // 6. ADMIN FUNCTIONS
    async function saveSettings() {
        const topMsg = document.getElementById('set-top-msg').value;
        const footerMsg = document.getElementById('set-footer-msg').value;
        await db.collection("settings").doc("main").set({topMsg, footerMsg}, {merge:true});
        alert("تم تحديث النصوص بنجاح");
    }

    async function addProduct() {
        const file = document.getElementById('p-img').files[0];
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const category = document.getElementById('p-cat').value;
        if(!file || !name || !price) return alert("يرجى إكمال كافة البيانات");

        document.getElementById('status').innerText = "جاري الرفع...";
        const formData = new FormData();
        formData.append("image", file);
        
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            const json = await res.json();
            await db.collection("products").add({ name, price, category, image: json.data.url, createdAt: new Date() });
            document.getElementById('status').innerText = "تم النشر بنجاح!";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
        } catch(e) { document.getElementById('status').innerText = "فشل في الرفع"; }
    }

    function deleteP(id) {
        if(confirm("حذف المنتج نهائياً من المتجر؟")) db.collection("products").doc(id).delete();
    }

    function filterCat(cat) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        loadProducts(cat);
    }
</script>
</body>
</html>
