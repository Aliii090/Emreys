<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>عطور دبل دبليو | Double W</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --black: #000; --gold: #c5a059; --white: #fff; --gray: #f9f9f9; }
        * { box-sizing: border-box; -webkit-user-select: auto !important; user-select: auto !important; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: var(--white); overflow-x: hidden; }

        /* Announcement Bar */
        .top-bar { background: var(--black); color: var(--white); text-align: center; padding: 10px; font-size: 0.9rem; letter-spacing: 1px; animation: fadeInDown 1s; }

        header { padding: 25px; text-align: center; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 2rem; font-weight: 700; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .logo:hover { color: var(--gold); }

        /* Hero Section */
        .hero { height: 60vh; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; text-align: center; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=1500&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .hero h1 { font-size: 3.5rem; margin: 0; animation: fadeInUp 1.2s; }

        /* Product Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
        .section-title { text-align: center; margin-bottom: 40px; font-size: 2rem; position: relative; }
        .section-title::after { content: ''; width: 50px; height: 2px; background: var(--gold); position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { border-radius: 0px; border: 1px solid #f0f0f0; background: #fff; transition: 0.4s; overflow: hidden; position: relative; animation: fadeIn 1.5s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 350px; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }
        .card-info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.4rem; display: block; margin: 10px 0; }
        .btn-order { background: var(--black); color: #fff; border: none; padding: 12px 25px; cursor: pointer; width: 100%; font-family: 'Tajawal'; font-weight: 600; transition: 0.3s; }
        .btn-order:hover { background: var(--gold); }

        /* Social Floating Buttons */
        .social-links { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .social-icon { width: 50px; height: 50px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .social-icon:hover { transform: scale(1.1) rotate(5deg); }

        /* Hidden Admin Overlay */
        #admin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; padding: 50px 20px; }
        .admin-card { max-width: 600px; margin: 0 auto; background: var(--gray); padding: 30px; border: 1px solid #ddd; }
        .admin-form input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn-save { background: #27ae60; color: white; width: 100%; padding: 15px; border: none; cursor: pointer; font-weight: bold; }
        .btn-close { background: #000; color: #fff; margin-bottom: 20px; padding: 10px; border: none; cursor: pointer; }
        .delete-badge { position: absolute; top: 10px; right: 10px; background: red; color: white; padding: 5px 10px; cursor: pointer; z-index: 5; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="top-bar">شحن مجاني للطلبات أكثر من 50 دينار</div>

<header>
    <div class="logo">DOUBLE W</div>
</header>

<section class="hero">
    <h1 class="animate__animated animate__fadeInUp">أناقة الروائح الشرقية</h1>
</section>

<div class="container">
    <h2 class="section-title">الأكثر مبيعاً</h2>
    <div class="grid" id="product-container">
        <p style="text-align: center; grid-column: 1/-1;">جاري تحميل العطور...</p>
    </div>
</div>

<div class="social-links">
    <a href="https://maps.google.com" target="_blank"><img src="maps.png" class="social-icon" alt="Maps"></a>
    <a href="https://facebook.com" target="_blank"><img src="facebook.png" class="social-icon" alt="Facebook"></a>
    <a href="https://instagram.com" target="_blank"><img src="instagram.png" class="social-icon" alt="Instagram"></a>
</div>

<div id="admin-overlay">
    <button class="btn-close" onclick="window.location.hash=''">إغلاق اللوحة ×</button>
    <div class="admin-card">
        <h3>إضافة منتج جديد</h3>
        <div class="admin-form">
            <input type="text" id="prod-name" placeholder="اسم المنتج">
            <input type="number" id="prod-price" placeholder="السعر">
            <input type="file" id="prod-img">
            <button class="btn-save" onclick="uploadToImgBB()">حفظ ونشر المنتج</button>
            <p id="upload-status" style="margin-top:10px; font-weight:bold;"></p>
        </div>
    </div>
</div>

<script>
    // 1. CONFIGS
    const firebaseConfig = {
        apiKey: "AIzaSyCoy1g_vb32AjBZQNBooSV6thU07Lwbbhk",
        authDomain: "perfumes-6207f.firebaseapp.com",
        projectId: "perfumes-6207f",
        storageBucket: "perfumes-6207f.firebasestorage.app",
        messagingSenderId: "276789183181",
        appId: "1:276789183181:web:cf7b7d3b4b30c9f3c09f84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_KEY = "2f414f808b93f92c4306a53541beb469";
    const ADMIN_PASS = "123456"; // <--- CHANGE YOUR PASSWORD HERE

    // 2. HIDDEN ADMIN TRIGGER
    window.addEventListener("hashchange", () => {
        if(window.location.hash === "#admin55") {
            let pass = prompt("الرجاء إدخال كلمة مرور الإدارة:");
            if(pass === ADMIN_PASS) {
                document.getElementById('admin-overlay').style.display = 'block';
                renderProducts(true); // Show delete buttons
            } else {
                alert("كلمة مرور خاطئة");
                window.location.hash = "";
            }
        } else {
            document.getElementById('admin-overlay').style.display = 'none';
            renderProducts(false);
        }
    });

    // 3. RENDER PRODUCTS
    function renderProducts(isAdmin) {
        const container = document.getElementById('product-container');
        db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                container.innerHTML += `
                    <div class="card animate__animated animate__fadeIn">
                        ${isAdmin ? `<div class="delete-badge" onclick="deleteProd('${doc.id}')">حذف ×</div>` : ''}
                        <img src="${p.image}" alt="${p.name}">
                        <div class="card-info">
                            <h3>${p.name}</h3>
                            <span class="price">${p.price} JOD</span>
                            <button class="btn-order">اطلب الآن</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    // Initialize
    renderProducts(false);

    // 4. ADMIN ACTIONS
    async function uploadToImgBB() {
        const file = document.getElementById('prod-img').files[0];
        const name = document.getElementById('prod-name').value;
        const price = document.getElementById('prod-price').value;
        const status = document.getElementById('upload-status');

        if(!file || !name || !price) return alert("اكمل البيانات");

        status.innerText = "جاري الرفع...";
        const formData = new FormData();
        formData.append("image", file);

        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            const json = await res.json();
            const url = json.data.url;

            await db.collection("products").add({
                name, price, image: url, createdAt: new Date()
            });
            status.innerText = "تم بنجاح!";
            document.getElementById('prod-name').value = "";
            document.getElementById('prod-price').value = "";
        } catch(e) {
            status.innerText = "فشل الرفع";
        }
    }

    function deleteProd(id) {
        if(confirm("حذف هذا العطر؟")) db.collection("products").doc(id).delete();
    }
</script>
</body>
</html>
