<!DOCTYPE html>
<html class="no-js" lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>متجري الخاص | Firebase Powered</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
      // TODO: Replace with YOUR Firebase Project Configuration
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
    </script>

    <style>
      :root {
        --primary-black: #000000;
        --accent-gold: #c5a059;
        --light-gray: #f8f8f8;
      }

      body {
        font-family: 'Tajawal', sans-serif;
        margin: 0;
        background-color: #fff;
        color: var(--primary-black);
      }

      /* Header & Nav */
      .header {
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid #eee;
        background: #fff;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      /* Hero Section inspired by original design */
      .hero {
        height: 70vh;
        background: #111;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://via.placeholder.com/1200x600');
        background-size: cover;
      }

      /* Product Grid */
      .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
      }

      .card {
        border-radius: 12px;
        overflow: hidden;
        transition: 0.3s;
        border: 1px solid #eee;
        background: #fff;
      }

      .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
      .card img { width: 100%; height: 300px; object-fit: cover; }
      .card-info { padding: 20px; text-align: center; }
      .price { font-weight: bold; color: var(--accent-gold); font-size: 1.2rem; }
      
      .btn-buy {
        width: 100%;
        padding: 12px;
        background: var(--primary-black);
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 10px;
      }

      /* Enable Text Selection (Removed original protection) */
      * { -webkit-user-select: auto !important; user-select: auto !important; }
    </style>
  </head>

  <body>

    <header class="header">
      <div style="font-size: 2rem; font-weight: 700; letter-spacing: 2px;">LOGO</div>
      <nav style="margin-top: 10px;">
        <a href="#" style="margin: 0 15px; text-decoration: none; color: #000;">الرئيسية</a>
        <a href="#" style="margin: 0 15px; text-decoration: none; color: #000;">المتجر</a>
        <a href="#" style="margin: 0 15px; text-decoration: none; color: #000;">عن المتجر</a>
      </nav>
    </header>

    <section class="hero">
      <h1 style="font-size: 3rem; margin-bottom: 10px;">أفخم العطور العالمية</h1>
      <p style="font-size: 1.2rem;">اكتشف الرائحة التي تعبر عن شخصيتك</p>
    </section>

    <div class="container">
      <h2 style="text-align: center; margin-bottom: 40px;">منتجاتنا المميزة</h2>
      <div class="grid" id="product-container">
        <p style="text-align: center; grid-column: 1/-1;">جاري تحميل المنتجات...</p>
      </div>
    </div>

    <footer style="background: #111; color: #fff; padding: 60px 20px; text-align: center;">
      <p>&copy; 2026 جميع الحقوق محفوظة</p>
    </footer>

    <script>
      // FIREBASE LOGIC: Fetch Products from Firestore
      const productContainer = document.getElementById('product-container');

      db.collection("products").get().then((querySnapshot) => {
        productContainer.innerHTML = ""; // Clear loader
        
        if (querySnapshot.empty) {
          productContainer.innerHTML = "<p>لا توجد منتجات حالياً.</p>";
          return;
        }

        querySnapshot.forEach((doc) => {
          const product = doc.data();
          
          productContainer.innerHTML += `
            <div class="card">
              <img src="${product.image || 'https://via.placeholder.com/300'}" alt="${product.name}">
              <div class="card-info">
                <h3>${product.name}</h3>
                <p class="price">${product.price} JOD</p>
                <button class="btn-buy">إضافة للسلة</button>
              </div>
            </div>
          `;
        });
      }).catch((error) => {
        console.log("Error getting products: ", error);
        productContainer.innerHTML = "<p>حدث خطأ أثناء تحميل البيانات.</p>";
      });
    </script>
  </body>
</html>
