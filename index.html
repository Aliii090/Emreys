<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>عطور أبو جاد | Abu Jad Perfumes</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --black: #080808; --gold: #c5a059; --white: #ffffff; --red: #d63031; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: var(--white); color: var(--black); overflow-x: hidden; scroll-behavior: smooth; }

        /* Announcement & Header */
        #top-announcement { background: var(--black); color: var(--white); text-align: center; padding: 12px; font-size: 0.8rem; font-weight: bold; }
        header { padding: 15px 5%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; color: var(--black); text-decoration: none; }

        /* Hero Video */
        .hero { position: relative; height: 80vh; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .hero video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.5); }
        .hero-content { text-align: center; color: white; z-index: 10; }
        .hero-content h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; font-weight: 500; text-shadow: 0 4px 20px rgba(0,0,0,0.6); }

        /* Red Offer Box */
        .offer-square { 
            background: var(--red); color: white; margin: 40px auto; max-width: 1160px; 
            display: grid; grid-template-columns: 1fr 1fr; border-radius: 15px; overflow: hidden; 
            position: relative; 
        }
        .offer-img { width: 100%; height: 350px; object-fit: cover; }
        .offer-details { padding: 40px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        /* New Smaller Rectangle Red Timer */
        .timer-badge { 
            position: absolute; top: 15px; left: 15px; background: var(--red); 
            padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; 
            color: white; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Filter Tabs */
        .filter-bar { display: flex; justify-content: center; gap: 15px; padding: 30px 10px; background: var(--white); }
        .filter-btn { padding: 8px 30px; border: 1px solid #eee; background: none; cursor: pointer; border-radius: 30px; font-family: 'Tajawal'; font-weight: bold; }
        .filter-btn.active { background: var(--black); color: white; }

        /* Product Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #f0f0f0; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .price { color: var(--gold); font-weight: 700; margin-bottom: 10px; display: block; font-size: 1.1rem; }
        .btn-cart { background: var(--black); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; font-size: 0.85rem; }

        /* Floating Elements */
        .float-wrap { position: fixed; bottom: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .right-float { right: 30px; }
        .left-float { left: 30px; }
        .icon-circle { width: 60px; height: 60px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); color: white; position: relative; font-size: 1.4rem; }
        .badge { position: absolute; top: 0; right: 0; background: var(--black); font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; }
        .social-img { width: 45px; height: 45px; object-fit: contain; }

        /* Footer */
        footer { background: var(--black); color: #fff; padding: 60px 20px; text-align: center; }
        .footer-msg { font-size: 1.5rem; color: var(--gold); margin-bottom: 20px; display: block; font-weight: bold; }

        /* ADMIN PANEL */
        #admin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; padding: 20px; overflow-y: auto; }
        .admin-box { max-width: 700px; margin: 0 auto; background: #fafafa; padding: 30px; border-radius: 15px; border: 1px solid #eee; }
        .admin-box h3 { border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 30px; }
        .admin-box input, .admin-box select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Tajawal'; }
        .inventory-item { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        .inventory-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }

        @media (max-width: 768px) { .offer-square { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="top-announcement">...</div>

<header>
    <a href="#" class="logo">ABU JAD PERFUMES</a>
</header>

<section class="hero">
    <video autoplay loop muted playsinline><source src="background.mp4" type="video/mp4"></video>
    <div class="hero-content"><h1>عطور أبو جاد</h1></div>
</section>

<div class="container" id="offer-container" style="display:none;">
    <div class="offer-square">
        <div class="timer-badge" id="countdown-timer">00:00:00</div>
        <img id="offer-image" class="offer-img" src="">
        <div class="offer-details">
            <h2 id="offer-title">عرض خاص</h2>
            <p id="offer-desc">تفاصيل العرض</p>
        </div>
    </div>
</div>

<div class="filter-bar">
    <button class="filter-btn active" onclick="filterCat('الكل')">الكل</button>
    <button class="filter-btn" onclick="filterCat('رجالي')">رجالي</button>
    <button class="filter-btn" onclick="filterCat('نسائي')">نسائي</button>
</div>

<div class="container"><div class="grid" id="product-grid"></div></div>

<div class="float-wrap right-float">
    <div class="icon-circle" onclick="checkoutWhatsApp()">🛒 <span class="badge" id="cart-count">0</span></div>
</div>

<div class="float-wrap left-float">
    <a href="https://www.instagram.com/abujad_fragrance"><img src="Instagram.png" class="social-img"></a>
    <a href="https://www.facebook.com/abujad.tartir"><img src="Facebook.png" class="social-img"></a>
    <a href="https://goo.gl/maps/Fsz9SMdaRoX9jmxN9?g_st=ac"><img src="maps.png" class="social-img"></a>
</div>

<footer>
    <span class="footer-msg" id="footer-msg">عطور أبو جاد</span>
    <p>© 2026 Abu Jad Perfumes</p>
</footer>

<div id="admin-overlay">
    <div class="admin-box">
        <button onclick="window.location.hash=''" style="background:#000; color:#fff; border:none; padding:10px 20px; cursor:pointer; border-radius:8px;">× إغلاق</button>
        
        <h3>إعدادات واجهة الموقع</h3>
        <input type="text" id="adm-top-msg" placeholder="نص العنوان العلوي (Announcement)">
        <input type="text" id="adm-footer-msg" placeholder="نص التذييل (Footer)">
        <button onclick="saveSiteSettings()" style="width:100%; padding:12px; background:var(--black); color:white; border:none; border-radius:8px; cursor:pointer;">حفظ نصوص الموقع</button>

        <h3>إدارة العرض المربع (الأحمر)</h3>
        <input type="text" id="adm-off-title" placeholder="عنوان العرض">
        <input type="text" id="adm-off-desc" placeholder="وصف العرض">
        <input type="datetime-local" id="adm-off-date">
        <input type="file" id="adm-off-img">
        <button onclick="updateOffer()" style="width:100%; padding:12px; background:var(--red); color:white; border:none; border-radius:8px; cursor:pointer;">تحديث العرض المربع</button>
        
        <h3>إضافة عطر جديد</h3>
        <input type="text" id="p-name" placeholder="اسم العطر">
        <input type="number" id="p-price" placeholder="السعر">
        <select id="p-cat"><option value="رجالي">رجالي</option><option value="نسائي">نسائي</option></select>
        <input type="file" id="p-img">
        <button onclick="addProduct()" style="width:100%; padding:15px; background:#2ecc71; color:white; border:none; border-radius:8px; cursor:pointer;">نشر المنتج</button>
        
        <div id="admin-inventory" style="margin-top:30px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCoy1g_vb32AjBZQNBooSV6thU07Lwbbhk",
        authDomain: "perfumes-6207f.firebaseapp.com",
        projectId: "perfumes-6207f",
        storageBucket: "perfumes-6207f.firebasestorage.app",
        messagingSenderId: "276789183181",
        appId: "1:276789183181:web:cf7b7d3b4b30c9f3c09f84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_KEY = "2f414f808b93f92c4306a53541beb469";

    let cart = [];
    let timerInterval;

    const checkAuth = () => {
        if(window.location.hash === "#admin55") {
            if(prompt("كلمة المرور") === "123456") document.getElementById('admin-overlay').style.display = 'block';
            else window.location.hash = "";
        } else { document.getElementById('admin-overlay').style.display = 'none'; }
    };
    window.addEventListener("hashchange", checkAuth);
    checkAuth();

    // Sync Data
    db.collection("settings").doc("main").onSnapshot(doc => {
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('top-announcement').innerText = data.topMsg || "أهلاً بك";
            document.getElementById('footer-msg').innerText = data.footerMsg || "Double W Perfumes";
            if(data.offerActive) {
                document.getElementById('offer-container').style.display = 'block';
                document.getElementById('offer-title').innerText = data.offerTitle;
                document.getElementById('offer-desc').innerText = data.offerDesc;
                document.getElementById('offer-image').src = data.offerImg;
                startTimer(data.offerDate);
            } else { document.getElementById('offer-container').style.display = 'none'; }
        }
    });

    function startTimer(endTime) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const distance = new Date(endTime).getTime() - new Date().getTime();
            if (distance < 0) { document.getElementById("countdown-timer").innerHTML = "00:00:00"; return clearInterval(timerInterval); }
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("countdown-timer").innerHTML = `${h}:${m}:${s}`;
        }, 1000);
    }

    function filterCat(cat) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
            const grid = document.getElementById('product-grid');
            const adminInv = document.getElementById('admin-inventory');
            grid.innerHTML = ""; adminInv.innerHTML = "<h3>قائمة الجرد</h3>";
            snap.forEach(doc => {
                const p = doc.data();
                if(cat === "الكل" || p.category === cat) {
                    grid.innerHTML += `<div class="card"><img src="${p.image}"><div class="card-info"><h3>${p.name}</h3><span class="price">${p.price} JOD</span><button class="btn-cart" onclick="addToCart('${p.name}', ${p.price})">إضافة للسلة</button></div></div>`;
                }
                adminInv.innerHTML += `<div class="inventory-item"><div style="display:flex;align-items:center;gap:10px;"><img src="${p.image}"><span>${p.name}</span></div><button onclick="deleteP('${doc.id}')" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">حذف</button></div>`;
            });
        });
    }
    filterCat('الكل');

    function addToCart(name, price) { cart.push({name, price}); document.getElementById('cart-count').innerText = cart.length; }
    function checkoutWhatsApp() {
        let msg = "طلب جديد من عطور أبو جاد:%0a" + cart.map(i => `- ${i.name}`).join("%0a");
        window.open(`https://wa.me/962782647590?text=${msg}`, '_blank');
    }

    // Admin Actions
    async function saveSiteSettings() {
        const topMsg = document.getElementById('adm-top-msg').value;
        const footerMsg = document.getElementById('adm-footer-msg').value;
        await db.collection("settings").doc("main").set({ topMsg, footerMsg }, {merge:true});
        alert("تم حفظ نصوص الموقع");
    }

    async function updateOffer() {
        const file = document.getElementById('adm-off-img').files[0];
        let imgUrl = document.getElementById('offer-image').src;
        if(file) {
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
            const json = await res.json(); imgUrl = json.data.url;
        }
        await db.collection("settings").doc("main").set({ 
            offerTitle: document.getElementById('adm-off-title').value, 
            offerDesc: document.getElementById('adm-off-desc').value, 
            offerDate: document.getElementById('adm-off-date').value, 
            offerImg: imgUrl, offerActive: true 
        }, {merge:true});
        alert("تم تحديث العرض");
    }

    async function addProduct() {
        const file = document.getElementById('p-img').files[0];
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
        const json = await res.json();
        await db.collection("products").add({ 
            name: document.getElementById('p-name').value, 
            price: document.getElementById('p-price').value, 
            category: document.getElementById('p-cat').value, 
            image: json.data.url, createdAt: new Date() 
        });
        alert("تم النشر");
    }

    function deleteP(id) { if(confirm("حذف؟")) db.collection("products").doc(id).delete(); }
</script>
</body>
</html>
