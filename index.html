<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>عطور أبو جاد | Abu Jad Perfumes</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --black: #080808; --gold: #c5a059; --white: #ffffff; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: var(--white); color: var(--black); overflow-x: hidden; scroll-behavior: smooth; }

        /* Announcement & Header */
        #top-announcement { background: var(--black); color: var(--white); text-align: center; padding: 12px; font-size: 0.8rem; letter-spacing: 1px; }
        header { padding: 15px 5%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; color: var(--black); text-decoration: none; }

        /* Hero Video */
        .hero { position: relative; height: 80vh; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .hero video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.6); }
        .hero-content { text-align: center; color: white; z-index: 10; }
        .hero-content h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; font-weight: 500; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* Product Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; border: 1px solid #f0f0f0; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        .price { color: var(--gold); font-weight: 700; margin-bottom: 10px; display: block; }
        .btn-cart { background: var(--black); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        /* Floating Controls */
        .float-wrap { position: fixed; bottom: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .right-float { right: 30px; }
        .left-float { left: 30px; }
        .icon-circle { width: 55px; height: 55px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); color: white; position: relative; }
        .social-img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        /* Footer */
        footer { background: var(--black); color: #fff; padding: 60px 20px 20px; text-align: center; }
        .footer-msg { font-size: 1.4rem; color: var(--gold); margin-bottom: 25px; display: block; font-weight: 600; }

        /* ADMIN OVERLAY REDESIGN */
        #admin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; padding: 20px; overflow-y: auto; }
        .admin-box { max-width: 600px; margin: 0 auto; background: #fafafa; padding: 25px; border-radius: 12px; border: 1px solid #eee; }
        .admin-box input, .admin-box select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Tajawal'; }
        
        /* Delete List Styling */
        .inventory-list { margin-top: 30px; border-top: 2px solid #ddd; padding-top: 20px; }
        .inventory-item { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        .inventory-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .btn-del-main { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-del-main:hover { background: #cc0000; }
    </style>
</head>
<body>

<div id="top-announcement">...</div>

<header>
    <a href="#" class="logo">ABU JAD PERFUMES</a>
</header>

<section class="hero">
    <video autoplay loop muted playsinline><source src="background.mp4" type="video/mp4"></video>
    <div class="hero-content"><h1>عطور أبو جاد</h1></div>
</section>

<div class="container" id="shop">
    <div class="grid" id="product-grid"></div>
</div>

<div class="float-wrap right-float">
    <div class="icon-circle" onclick="checkoutWhatsApp()">🛒 <span id="cart-count" style="margin-right:5px;">0</span></div>
</div>

<div class="float-wrap left-float">
    <a href="https://instagram.com" target="_blank"><img src="Instagram.png" class="social-img"></a>
    <a href="https://facebook.com" target="_blank"><img src="Facebook.png" class="social-img"></a>
    <a href="#"><img src="maps.png" class="social-img"></a>
</div>

<footer>
    <span class="footer-msg" id="footer-msg">Double W | Abu Jad Perfumes</span>
    <p>© 2026 All Rights Reserved</p>
</footer>

<div id="admin-overlay">
    <div class="admin-box">
        <button onclick="closeAdmin()" style="background:#000; color:#fff; border:none; padding:10px 20px; cursor:pointer; border-radius:5px; margin-bottom:20px;">× إغلاق اللوحة</button>
        
        <h3>إضافة عطر جديد</h3>
        <input type="text" id="p-name" placeholder="اسم العطر">
        <input type="number" id="p-price" placeholder="السعر">
        <input type="file" id="p-img">
        <button onclick="addProduct()" style="width:100%; padding:15px; background:#2ecc71; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">نشر المنتج</button>
        
        <div class="inventory-list">
            <h3>قائمة المنتجات الحالية (للحذف)</h3>
            <p style="font-size: 0.8rem; color: #666;">اضغط على "حذف" لإزالة المنتج من الموقع نهائياً</p>
            <div id="admin-inventory">
                </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCoy1g_vb32AjBZQNBooSV6thU07Lwbbhk",
        authDomain: "perfumes-6207f.firebaseapp.com",
        projectId: "perfumes-6207f",
        storageBucket: "perfumes-6207f.firebasestorage.app",
        messagingSenderId: "276789183181",
        appId: "1:276789183181:web:cf7b7d3b4b30c9f3c09f84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_KEY = "2f414f808b93f92c4306a53541beb469";

    let cart = [];

    // Check Admin Mode
    const checkHash = () => {
        if(window.location.hash === "#admin55") {
            if(prompt("كلمة مرور الإدارة") === "123456") {
                document.getElementById('admin-overlay').style.display = 'block';
            } else { window.location.hash = ""; }
        } else { document.getElementById('admin-overlay').style.display = 'none'; }
    };
    window.addEventListener("hashchange", checkHash);
    checkHash();

    function closeAdmin() { window.location.hash = ""; }

    // Live Settings
    db.collection("settings").doc("main").onSnapshot(doc => {
        if(doc.exists) {
            document.getElementById('top-announcement').innerText = doc.data().topMsg || "أهلاً بك";
            document.getElementById('footer-msg').innerText = doc.data().footerMsg || "Double W Perfumes";
        }
    });

    // Load Products (For Store & Admin List)
    db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
        const grid = document.getElementById('product-grid');
        const adminInv = document.getElementById('admin-inventory');
        grid.innerHTML = "";
        adminInv.innerHTML = "";

        snap.forEach(doc => {
            const p = doc.data();
            
            // Add to main store
            grid.innerHTML += `
                <div class="card animate__animated animate__fadeIn">
                    <img src="${p.image}">
                    <div class="card-info">
                        <h3>${p.name}</h3>
                        <span class="price">${p.price} JOD</span>
                        <button class="btn-cart" onclick="addToCart('${p.name}', ${p.price})">إضافة للسلة</button>
                    </div>
                </div>
            `;

            // Add to admin delete list
            adminInv.innerHTML += `
                <div class="inventory-item">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${p.image}">
                        <div>
                            <div style="font-weight:bold; font-size:0.9rem;">${p.name}</div>
                            <div style="font-size:0.8rem; color:var(--gold);">${p.price} JOD</div>
                        </div>
                    </div>
                    <button class="btn-del-main" onclick="deleteP('${doc.id}')">حذف</button>
                </div>
            `;
        });
    });

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        alert("تمت الإضافة");
    }

    function checkoutWhatsApp() {
        if(cart.length === 0) return alert("السلة فارغة");
        let msg = "طلب جديد:%0a" + cart.map(i => `- ${i.name}`).join("%0a");
        window.open(`https://wa.me/962782647590?text=${msg}`, '_blank');
    }

    // Admin Actions
    async function addProduct() {
        const file = document.getElementById('p-img').files[0];
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(!file || !name) return alert("اكمل البيانات");

        const formData = new FormData();
        formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
        const json = await res.json();
        
        await db.collection("products").add({ name, price, image: json.data.url, createdAt: new Date() });
        alert("تم النشر");
    }

    function deleteP(id) {
        if(confirm("هل أنت متأكد من حذف هذا العطر نهائياً؟")) {
            db.collection("products").doc(id).delete();
        }
    }
</script>
</body>
</html>
